const container = document.getElementById('quiz-content');

data.forEach((item, index) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    qDiv.innerHTML = `
        <span class="q-text">Câu ${index + 1}: ${item.q}</span>
        <div class="options">
            ${item.a.map((opt, i) => `
                <label id="label-${index}-${i}">
                    <input type="radio" name="q${index}" value="${i}">
                    ${String.fromCharCode(65 + i)}. ${opt}
                </label>
            `).join('')}
        </div>
        <div class="msg" id="msg-${index}"></div>
    `;
    container.appendChild(qDiv);
});

document.getElementById('btn-submit').onclick = function() {
    let score = 0;
    data.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const msg = document.getElementById(`msg-${index}`);
        const correctIdx = item.c;
        
        // Reset
        for(let i=0; i<4; i++) document.getElementById(`label-${index}-${i}`).className = '';
        msg.style.display = 'none';

        // Luôn hiện màu xanh cho đáp án đúng
        document.getElementById(`label-${index}-${correctIdx}`).classList.add('correct-ans');

        if (selected) {
            const userIdx = parseInt(selected.value);
            if (userIdx === correctIdx) {
                score++;
            } else {
                document.getElementById(`label-${index}-${userIdx}`).classList.add('wrong-ans');
                msg.innerHTML = `❌ Sai rồi! Đáp án đúng là ${String.fromCharCode(65 + correctIdx)}`;
                msg.style.color = '#dc3545';
                msg.style.display = 'block';
            }
        } else {
            msg.innerHTML = `⚠️ Bạn chưa chọn đáp án. Đáp án đúng là ${String.fromCharCode(65 + correctIdx)}`;
            msg.style.color = '#f39c12';
            msg.style.display = 'block';
        }
    });

    const board = document.getElementById('score-board');
    board.style.display = 'block';
    board.innerHTML = `KẾT QUẢ: ${score}/${data.length} CÂU ĐÚNG (${((score/data.length)*10).toFixed(2)} ĐIỂM)`;
    board.style.backgroundColor = score > 35 ? '#d4edda' : '#f8d7da';
    window.scrollTo({ top: 0, behavior: 'smooth' });
};
</script>
